name: Headless Smoke

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Headless tests
        run: npm run test:headless

      - name: Headless demo
        run: npm run demo:headless

      - name: Build
        run: npm run build

      - name: Upload headless artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: headless-demo-geojson
          path: artifacts/headless-demo.geojson
          if-no-files-found: error
